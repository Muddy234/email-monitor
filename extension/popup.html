<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      padding: 16px;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #111;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .row:last-child { border-bottom: none; }
    .label { color: #666; }
    .value { font-weight: 500; text-align: right; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .green { background: #22c55e; }
    .red { background: #ef4444; }
    .yellow { background: #eab308; }
    .gray { background: #9ca3af; }
    .section { margin-top: 12px; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #999;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <h1>Email Monitor Bridge</h1>

  <div class="section">
    <div class="section-title">Token</div>
    <div class="row">
      <span class="label">Status</span>
      <span class="value" id="tokenStatus">—</span>
    </div>
    <div class="row">
      <span class="label">Expires</span>
      <span class="value" id="tokenExpires">—</span>
    </div>
    <div class="row">
      <span class="label">Origin</span>
      <span class="value" id="tokenOrigin">—</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">WebSocket</div>
    <div class="row">
      <span class="label">Flask</span>
      <span class="value" id="wsStatus">—</span>
    </div>
    <div class="row">
      <span class="label">Backoff</span>
      <span class="value" id="wsBackoff">—</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Activity</div>
    <div class="row">
      <span class="label">Last command</span>
      <span class="value" id="lastCmd">—</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
