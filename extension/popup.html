<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src https://frbvdoszenrrlswegsxq.supabase.co; style-src 'self' 'unsafe-inline'; img-src 'self'; frame-ancestors 'none';">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      padding: 16px;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #111;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .green { background: #22c55e; }
    .red { background: #ef4444; }

    /* Auth form */
    #loginView { display: none; }
    #statusView { display: none; }
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 3px; }
    .form-group input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
    }
    .form-group input:focus { border-color: #3b82f6; }
    .btn {
      display: inline-block;
      padding: 7px 16px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary { background: #3b82f6; color: #fff; width: 100%; }
    .btn-primary:hover { background: #2563eb; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-outline { background: none; border: 1px solid #ddd; color: #666; }
    .btn-outline:hover { background: #f5f5f5; }
    .auth-link {
      text-align: center;
      margin-top: 8px;
      font-size: 12px;
      color: #3b82f6;
      cursor: pointer;
    }
    .auth-link:hover { text-decoration: underline; }
    .error-msg {
      color: #ef4444;
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }
    .user-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      margin-bottom: 4px;
      border-bottom: 1px solid #f0f0f0;
    }
    .user-email { font-size: 12px; color: #666; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
    .btn-row { display: flex; gap: 8px; margin-top: 10px; }
    .btn-row .btn { flex: 1; text-align: center; }

    /* Welcome + Setup views */
    #welcomeView, #setupView { display: none; }
    .welcome-text { font-size: 13px; color: #444; line-height: 1.5; margin-bottom: 12px; }
    .checklist { list-style: none; padding: 0; }
    .checklist li {
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .checklist li:last-child { border-bottom: none; }
    .check-icon { font-size: 15px; flex-shrink: 0; }
    .check-done { color: #22c55e; }
    .check-pending { color: #d1d5db; }
    .setup-greeting { font-size: 13px; color: #444; margin-bottom: 10px; }

    /* Connection indicator (inline in user bar) */
    .connection-indicator {
      font-size: 11px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .connection-hint {
      display: block;
      font-size: 11px;
      color: #999;
      font-weight: 400;
      margin-top: 2px;
    }

    /* Draft card */
    .draft-card {
      display: block;
      background: #f8f9fa;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      margin: 14px 0;
      cursor: pointer;
      border: 1.5px solid #e5e7eb;
      transition: background 0.15s, border-color 0.15s;
    }
    .draft-card:hover { background: #f0f4ff; border-color: #3b82f6; }
    .draft-number {
      font-size: 28px;
      font-weight: 700;
      color: #111;
      line-height: 1;
    }
    .draft-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-top: 6px;
    }
    .draft-hint {
      font-size: 11px;
      color: #3b82f6;
      margin-top: 6px;
    }

    /* Skeleton loading pulse */
    .skeleton-text {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: pulse 1.5s ease-in-out infinite;
      border-radius: 3px;
      min-height: 28px;
      min-width: 32px;
      color: transparent;
      display: inline-block;
    }
    @keyframes pulse {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Status-view error */
    .status-error {
      color: #ef4444;
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }

    /* Logout confirmation */
    .logout-confirm { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; }
    .logout-confirm span { color: #666; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
  </style>
</head>
<body>
  <h1>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" width="20" height="20">
      <rect x="2" y="6" width="28" height="20" rx="3" stroke="#2563EB" stroke-width="2.2"/>
      <path d="M2 9l13.1 8.3a1.94 1.94 0 0 0 1.8 0L30 9" stroke="#2563EB" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="26" cy="8" r="4" fill="#10B981"/>
      <circle cx="26" cy="8" r="6" fill="none" stroke="#10B981" stroke-width="1.2" opacity="0.5"/>
    </svg>
    Clarion AI
  </h1>

  <!-- Welcome view (first install) -->
  <div id="welcomeView">
    <p class="welcome-text">
      Clarion AI monitors your Outlook inbox and drafts smart replies so you can focus on what matters.
    </p>
    <button class="btn btn-primary" id="getStartedBtn">Get Started</button>
  </div>

  <!-- Login / Sign Up view -->
  <div id="loginView">
    <div class="form-group">
      <label for="authEmail">Email</label>
      <input type="email" id="authEmail" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label for="authPassword">Password</label>
      <input type="password" id="authPassword" placeholder="Password">
    </div>
    <button class="btn btn-primary" id="loginBtn">Log In</button>
    <div class="auth-link" id="toggleAuth">Don't have an account? Sign up</div>
    <div class="error-msg" id="authError"></div>
  </div>

  <!-- Setup checklist (post-login, pre-ready) -->
  <div id="setupView">
    <p class="setup-greeting" id="setupGreeting">Almost there!</p>
    <ul class="checklist">
      <li>
        <span class="check-icon" id="checkAuth">&#x2B58;</span>
        <span>Sign in to Clarion AI</span>
      </li>
      <li>
        <span class="check-icon" id="checkOutlook">&#x2B58;</span>
        <span>Open Outlook in this browser</span>
      </li>
      <li>
        <span class="check-icon" id="checkSync">&#x2B58;</span>
        <span>First email sync</span>
      </li>
    </ul>
    <div class="btn-row" style="margin-top: 12px;">
      <button class="btn btn-sm btn-outline" id="setupSyncBtn">Sync Now</button>
    </div>
  </div>

  <!-- Status dashboard (when authenticated) -->
  <div id="statusView">
    <!-- User Bar -->
    <div class="user-bar">
      <span class="user-email" id="userEmail">—</span>
      <span class="connection-indicator" id="connectionIndicator">
        <span class="dot green"></span>
        <span id="connectionText">Connected</span>
      </span>
    </div>
    <span class="connection-hint" id="connectionHint" style="display:none;"></span>

    <!-- Drafts Card -->
    <div class="draft-card" id="draftCard">
      <div class="draft-number skeleton-text" id="draftCount">&nbsp;</div>
      <div class="draft-label">Drafts Generated</div>
      <div class="draft-hint">Click to view in Outlook</div>
    </div>

    <div class="status-error" id="statusError"></div>

    <!-- Actions -->
    <div class="btn-row">
      <button class="btn btn-primary" id="visitWebBtn" style="flex:1;">Open Dashboard</button>
      <span id="logoutContainer">
        <button class="btn btn-sm btn-outline" id="logoutBtn">Logout</button>
      </span>
    </div>
  </div>

  <script src="supabase-config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
