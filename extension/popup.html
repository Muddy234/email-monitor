<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      padding: 16px;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #111;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .row:last-child { border-bottom: none; }
    .label { color: #666; }
    .value { font-weight: 500; text-align: right; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .green { background: #22c55e; }
    .red { background: #ef4444; }
    .yellow { background: #eab308; }
    .gray { background: #9ca3af; }
    .section { margin-top: 12px; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #999;
      margin-bottom: 4px;
    }

    /* Auth form */
    #loginView { display: none; }
    #statusView { display: none; }
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 3px; }
    .form-group input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
    }
    .form-group input:focus { border-color: #3b82f6; }
    .btn {
      display: inline-block;
      padding: 7px 16px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary { background: #3b82f6; color: #fff; width: 100%; }
    .btn-primary:hover { background: #2563eb; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-outline { background: none; border: 1px solid #ddd; color: #666; }
    .btn-outline:hover { background: #f5f5f5; }
    .auth-link {
      text-align: center;
      margin-top: 8px;
      font-size: 12px;
      color: #3b82f6;
      cursor: pointer;
    }
    .auth-link:hover { text-decoration: underline; }
    .error-msg {
      color: #ef4444;
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }
    .user-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      margin-bottom: 4px;
      border-bottom: 1px solid #f0f0f0;
    }
    .user-email { font-size: 12px; color: #666; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
    .btn-row { display: flex; gap: 8px; margin-top: 10px; }
    .btn-row .btn { flex: 1; text-align: center; }
  </style>
</head>
<body>
  <h1>Email Monitor</h1>

  <!-- Login / Sign Up view -->
  <div id="loginView">
    <div class="form-group">
      <label for="authEmail">Email</label>
      <input type="email" id="authEmail" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label for="authPassword">Password</label>
      <input type="password" id="authPassword" placeholder="Password">
    </div>
    <button class="btn btn-primary" id="loginBtn">Log In</button>
    <div class="auth-link" id="toggleAuth">Don't have an account? Sign up</div>
    <div class="error-msg" id="authError"></div>
  </div>

  <!-- Status dashboard (when authenticated) -->
  <div id="statusView">
    <div class="user-bar">
      <span class="user-email" id="userEmail">—</span>
      <button class="btn btn-sm btn-outline" id="logoutBtn">Logout</button>
    </div>

    <div class="section">
      <div class="section-title">Supabase</div>
      <div class="row">
        <span class="label">Auth</span>
        <span class="value" id="supabaseAuth">—</span>
      </div>
      <div class="row">
        <span class="label">Last sync</span>
        <span class="value" id="lastSync">—</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Outlook Token</div>
      <div class="row">
        <span class="label">Status</span>
        <span class="value" id="tokenStatus">—</span>
      </div>
      <div class="row">
        <span class="label">Expires</span>
        <span class="value" id="tokenExpires">—</span>
      </div>
      <div class="row">
        <span class="label">Origin</span>
        <span class="value" id="tokenOrigin">—</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Activity</div>
      <div class="row">
        <span class="label">Last command</span>
        <span class="value" id="lastCmd">—</span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-sm btn-primary" id="syncNowBtn">Sync Now</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
