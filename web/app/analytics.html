<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://esm.sh; connect-src https://*.supabase.co wss://*.supabase.co https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;">
    <title>Analytics — Clarion AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="em-app">
    <nav id="em-sidebar" class="em-sidebar"></nav>
    <main class="em-main em-fade-in">
        <div class="em-page-header">
            <div>
                <h1 class="em-page-title">Analytics</h1>
                <p class="em-page-subtitle" id="pageSubtitle">Email volume and insights</p>
            </div>
            <div class="em-filter-bar">
                <button class="em-filter-btn" data-range="7">7 days</button>
                <button class="em-filter-btn active" data-range="30">30 days</button>
                <button class="em-filter-btn" data-range="90">90 days</button>
            </div>
        </div>

        <!-- Charts row -->
        <div class="em-card-grid em-stagger">
            <div class="em-card" id="volumeChart">
                <div class="em-card-title">Email Volume</div>
                <div class="em-chart-container" id="volumeChartBody">
                    <div class="em-skeleton em-skeleton-card"></div>
                </div>
            </div>
            <div class="em-card" id="draftsChart">
                <div class="em-card-title">Drafts Generated</div>
                <div class="em-chart-container" id="draftsChartBody">
                    <div class="em-skeleton em-skeleton-card"></div>
                </div>
            </div>
        </div>

        <!-- Summary stats -->
        <div class="em-card-grid em-stagger" id="summaryStats"></div>

        <!-- Top senders -->
        <div class="em-card" id="topSendersCard">
            <div class="em-card-title">Top Senders</div>
            <div id="topSendersBody">
                <div class="em-skeleton em-skeleton-card"></div>
            </div>
        </div>
    </main>

    <script type="module" src="/js/pages/analytics.js"></script>
</body>
</html>
