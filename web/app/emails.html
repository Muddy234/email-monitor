<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://esm.sh; connect-src https://*.supabase.co wss://*.supabase.co https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;">
    <title>Emails — Clarion AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="em-app">
    <nav id="em-sidebar" class="em-sidebar"></nav>
    <main class="em-main em-fade-in">
        <div class="em-page-header">
            <div>
                <h1 class="em-page-title">Emails</h1>
                <p class="em-page-subtitle" id="pageSubtitle"></p>
            </div>
            <div class="em-filter-bar">
                <input class="em-search" type="text" id="searchInput" placeholder="Search by sender or subject...">
                <button class="em-btn em-btn-secondary em-btn-sm" id="refreshBtn">Refresh</button>
            </div>
        </div>

        <!-- Tab navigation: Drafts / Notable / All Emails -->
        <div class="em-email-tabs" id="emailTabs">
            <button class="em-email-tab active" data-tab="drafts">Drafts <span class="em-tab-count" id="draftsCount">0</span></button>
            <button class="em-email-tab" data-tab="notable">Notable <span class="em-tab-count" id="notableCount">0</span></button>
            <button class="em-email-tab" data-tab="all">All Emails <span class="em-tab-count" id="allCount">0</span></button>
        </div>

        <div id="emailsContainer">
            <div class="em-email-list">
                <div class="em-skeleton em-skeleton-card" style="height: 80px;"></div>
                <div class="em-skeleton em-skeleton-card" style="height: 80px;"></div>
                <div class="em-skeleton em-skeleton-card" style="height: 80px;"></div>
            </div>
        </div>
    </main>

    <script type="module" src="/js/pages/emails.js"></script>
</body>
</html>
