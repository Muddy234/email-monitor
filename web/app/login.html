<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://esm.sh; connect-src https://*.supabase.co wss://*.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;">
    <title>Login — Clarion AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div class="em-login-wrap">
        <div class="em-login-card">
            <h1 class="em-login-title">Clarion AI</h1>
            <p class="em-login-subtitle">Sign in to your dashboard</p>

            <div id="authError" class="em-form-error"></div>

            <form id="authForm" autocomplete="on">
                <div class="em-form-group" id="nameGroup" style="display: none;">
                    <label class="em-form-label" for="authName">Name (used in email sign-offs)</label>
                    <input class="em-form-input" type="text" id="authName" placeholder="e.g. Nate McBride" autocomplete="name">
                </div>

                <div class="em-form-group">
                    <label class="em-form-label" for="authEmail">Email</label>
                    <input class="em-form-input" type="email" id="authEmail" placeholder="you@company.com" autocomplete="email">
                </div>

                <div class="em-form-group">
                    <label class="em-form-label" for="authPassword">Password</label>
                    <input class="em-form-input" type="password" id="authPassword" placeholder="Password" autocomplete="current-password">
                </div>

                <button type="submit" class="em-btn em-btn-primary" id="loginBtn" style="width: 100%; justify-content: center;">Log In</button>
            </form>

            <!-- Phone OTP fallback verification (shown after signup when email may be blocked) -->
            <div id="phoneVerifySection" style="display: none;">
                <p class="em-form-info" id="verifyHint" style="text-align: center; color: #78716C; font-size: 14px; margin: 12px 0 8px;">Check your email to confirm your account</p>
                <button class="em-login-toggle" id="phoneVerifyToggle">Didn't receive the email? Verify by phone instead</button>
                <div id="phoneInputGroup" style="display: none;">
                    <div class="em-form-group">
                        <label class="em-form-label" for="phoneInput">Phone number</label>
                        <input class="em-form-input" type="tel" id="phoneInput" placeholder="+1 (555) 123-4567">
                    </div>
                    <button class="em-btn em-btn-primary" id="sendCodeBtn" style="width: 100%; justify-content: center;">Send Code</button>
                </div>
                <div id="codeInputGroup" style="display: none;">
                    <div class="em-form-group">
                        <label class="em-form-label" for="otpInput">Verification code</label>
                        <input class="em-form-input" type="text" id="otpInput" placeholder="123456" maxlength="6" inputmode="numeric">
                    </div>
                    <button class="em-btn em-btn-primary" id="verifyCodeBtn" style="width: 100%; justify-content: center;">Verify</button>
                </div>
            </div>

            <button class="em-login-toggle" id="toggleAuth">Don't have an account? Sign up</button>
        </div>
    </div>

    <script type="module" src="/js/pages/login.js"></script>
</body>
</html>
