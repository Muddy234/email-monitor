<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1200px;
            height: 630px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1D4ED8 0%, #0F172A 100%);
            font-family: system-ui, -apple-system, sans-serif;
            color: #FFFFFF;
            overflow: hidden;
        }
        .logo-row {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 28px;
        }
        .logo-row svg {
            width: 88px;
            height: 88px;
            color: #FFFFFF;
        }
        .brand {
            font-size: 72px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .tagline {
            font-size: 30px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.75);
        }
        .url {
            font-size: 20px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 48px;
        }
    </style>
</head>
<body>
    <div class="logo-row">
        <svg viewBox="0 0 32 32" fill="none">
            <rect x="2" y="6" width="28" height="20" rx="3" stroke="currentColor" stroke-width="2.2"/>
            <path d="M2 9l13.1 8.3a1.94 1.94 0 0 0 1.8 0L30 9" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="26" cy="8" r="4" fill="#10B981"/>
            <circle cx="26" cy="8" r="6" fill="none" stroke="#10B981" stroke-width="1.2" opacity="0.5"/>
        </svg>
        <span class="brand">Clarion AI</span>
    </div>
    <p class="tagline">AI-Powered Email Intelligence for Outlook</p>
    <p class="url">clarion-ai.app</p>
</body>
</html>
